name: 🚀 Deploy Manual

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch para fazer deploy'
        required: true
        default: 'main'
        type: string
      ambiente:
        description: 'Ambiente de destino'
        required: true
        default: 'producao'
        type: choice
        options:
          - producao

jobs:
  deploy:
    name: Deploy → ${{ github.event.inputs.ambiente }} (${{ github.event.inputs.branch }})
    runs-on: ubuntu-latest

    steps:
      - name: 📋 Informações do Deploy
        run: |
          echo "============================================"
          echo "🌿 Branch:     ${{ github.event.inputs.branch }}"
          echo "🎯 Ambiente:   ${{ github.event.inputs.ambiente }}"
          echo "👤 Solicitado: ${{ github.actor }}"
          echo "🕐 Horário:    $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "============================================"

      - name: 🔐 Deploy via SSH na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 15m
          script: |
            set -e
            BRANCH="${{ github.event.inputs.branch }}"
            AMBIENTE="${{ github.event.inputs.ambiente }}"
            REPO_RAW="https://raw.githubusercontent.com/alexandreseverogh/NetImobiliaria/$BRANCH"

            echo "🔄 Atualizando arquivos de infraestrutura do GitHub..."
            curl -fsSL "$REPO_RAW/Dockerfile.prod" -o ~/net-imobiliaria/Dockerfile.prod
            curl -fsSL "$REPO_RAW/Dockerfile.feed" -o ~/net-imobiliaria/Dockerfile.feed
            curl -fsSL "$REPO_RAW/docker-compose.vps.yml" -o ~/net-imobiliaria/docker-compose.vps.yml
            mkdir -p ~/net-imobiliaria/scripts/vps
            curl -fsSL "$REPO_RAW/scripts/vps/deploy-github.sh" -o ~/net-imobiliaria/scripts/vps/deploy-github.sh
            curl -fsSL "$REPO_RAW/scripts/vps/apply-migrations.sh" -o ~/net-imobiliaria/scripts/vps/apply-migrations.sh
            chmod +x ~/net-imobiliaria/scripts/vps/deploy-github.sh
            chmod +x ~/net-imobiliaria/scripts/vps/apply-migrations.sh
            echo "   ✅ Infraestrutura atualizada!"

            echo "🚀 Iniciando deploy — Branch: $BRANCH | Ambiente: $AMBIENTE"
            cd ~/net-imobiliaria
            ./scripts/vps/deploy-github.sh "$BRANCH" "$AMBIENTE"

      - name: ✅ Deploy Concluído
        run: |
          echo "Deploy de '${{ github.event.inputs.branch }}' para '${{ github.event.inputs.ambiente }}' concluído!"
